{% extends 'layout/base.html' %}

{% block content %}

<div class="verify-card success">
    <div class="verify-icon">✅</div>
    <h2>Tiket Valid!</h2>
    <p class="subtitle">Tiket berhasil diverifikasi</p>
    
    <div class="ticket-details">
        <div class="detail-row">
            <span>👤 Nama</span>
            <span>{{ nama }}</span>
        </div>
    </div>
    
    <div class="verify-qr">
        <img src="/static/img/{{ qr_image }}" alt="QR">
    </div>
    
    <p class="welcome">🎢 Selamat bermain di Nice PlayLand!</p>
</div>

{% endblock %}
